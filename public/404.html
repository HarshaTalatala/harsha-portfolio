<!doctype html>
<html lang="en">
  <head>

    <title>Page Not Found | Harsha Portfolio</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #f3f4f6;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        padding: 32px;
        background: rgba(17, 24, 39, 0.55);
      }
      a {
        display: inline-block;
        margin-top: 20px;
        background: linear-gradient(90deg, #f97316, #fbbf24);
        color: #111827;
        text-decoration: none;
        font-weight: 700;
        padding: 10px 18px;
        border-radius: 10px;
      }
      a:focus-visible {
        outline: 2px solid #fb923c;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404 — Page Not Found</h1>
      <p>
        The page you were looking for does not exist or has moved. Use the button below to return to the portfolio home page.
      </p>
      <a href="/">Go to Home</a>
